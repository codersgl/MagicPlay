name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run weekly on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
    
    - name: Install dependencies
      run: |
        uv venv
        source .venv/bin/activate
        uv pip install -e ".[dev]"
    
    - name: Run static analysis and linting
      run: |
        source .venv/bin/activate
        echo "=== Running ruff format check ==="
        ruff format --check src test
        echo "=== Running ruff linting ==="
        ruff check src test
        # echo "=== Running mypy type checking ==="
        # mypy src
    
    - name: Run tests with coverage
      env:
        DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY || 'fake-key-for-ci-testing' }}
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || 'fake-key-for-ci-testing' }}
      run: |
        source .venv/bin/activate
        echo "=== Running pytest with coverage ==="
        python -m pytest test/ --cov=src/magicplay --cov-report=xml --cov-report=term-missing -v
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        cache: 'pip'
    
    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
    
    - name: Build package
      run: |
        uv venv
        source .venv/bin/activate
        uv pip install build
        python -m build
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: magicplay-dist
        path: dist/
        retention-days: 7

  deploy-docs:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    
    - name: Generate documentation
      run: |
        echo "Documentation generation would go here"
        echo "Consider adding Sphinx or mkdocs for documentation"
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs/_build/html
        publish_branch: gh-pages